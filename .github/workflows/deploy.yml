name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build & Push Backend
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:${{ github.sha }} ./backend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:${{ github.sha }}

    - name: Build & Push Frontend
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:${{ github.sha }} ./frontend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:${{ github.sha }}

    - name: Update Kubernetes Manifests
      run: |
        sed -i 's|achdan/todo-backend:latest|${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:${{ github.sha }}|g' k8s/backend-deployment.yaml
        sed -i 's|achdan/todo-frontend:latest|${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:${{ github.sha }}|g' k8s/frontend-deployment.yaml